<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud OS v12: Ultra</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #c9d1d9; font-family: -apple-system, sans-serif; overflow: hidden; }

        /* Сетка приложения */
        .app { display: flex; height: 100vh; max-width: 900px; margin: 0 auto; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex-direction: column; }

        /* Сообщения */
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; max-width: 80%; position: relative; align-self: flex-start; }
        .is-me { align-self: flex-end; border-color: #238636; background: #23863611; }

        .author { font-size: 12px; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        .text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; }
        .media { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; border: 1px solid var(--border); }

        /* Реакции */
        .reacts { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .re-btn { background: #30363d; border: none; border-radius: 20px; padding: 3px 10px; color: white; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .re-btn:hover { background: #444; transform: scale(1.1); }

        /* Панель ввода */
        .input-box { background: var(--card); border-top: 1px solid var(--border); padding: 15px; }
        .tools { display: flex; gap: 15px; margin-bottom: 10px; font-size: 20px; }
        .tools span { cursor: pointer; filter: grayscale(1); transition: 0.2s; }
        .tools span:hover { filter: grayscale(0); transform: scale(1.2); }

        .input-row { display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send { background: #238636; border: none; color: white; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:var(--card); padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center;">
            <h2>Cloud OS</h2>
            <input type="text" id="nick" placeholder="Ник" style="width:100%; padding:10px; margin-bottom:10px; background:#0d1117; color:white; border:1px solid var(--border);">
            <input type="email" id="mail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:20px; background:#0d1117; color:white; border:1px solid var(--border);">
            <button onclick="login()" class="send" style="width:100%; height:40px;">Войти</button>
        </div>
    </div>

    <div class="app">
        <div id="chat"></div>
        <div class="input-box">
            <div class="tools">
                <span onclick="addE('😂')">😂</span><span onclick="addE('🔥')">🔥</span><span onclick="addE('❤️')">❤️</span>
                <span onclick="document.getElementById('f').click()">📎</span>
            </div>
            <div class="input-row">
                <input type="file" id="f" class="hidden" onchange="upFile(this)">
                <input type="text" id="msgInput" placeholder="Сообщение или GIF ссылка..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" class="send">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, updateDoc, query, onSnapshot, orderBy, limit, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const st = getStorage(app);
        let user = JSON.parse(localStorage.getItem('cloudUser'));

        window.login = async () => {
            const n = nick.value, e = mail.value.trim();
            if(!n || !e) return;
            const id = e.replace(/\./g, '_');
            await setDoc(doc(db, "users", id), { name: n, email: e }, { merge: true });
            localStorage.setItem('cloudUser', JSON.stringify({id, name: n, email: e}));
            location.reload();
        };

        if(user) auth.classList.add('hidden');

        window.send = async () => {
            const txt = msgInput.value.trim();
            if(!txt || !user) return;
            msgInput.value = "";
            let type = (txt.includes("giphy.com") || txt.endsWith(".gif")) ? "gif" : "text";
            await addDoc(collection(db, "messages"), {
                uid: user.id, name: user.name, text: txt, type: type,
                reactions: { "😂": 0, "🔥": 0, "❤️": 0 }, time: serverTimestamp()
            });
        };

        window.upFile = async (el) => {
            const file = el.files[0]; if(!file) return;
            const r = ref(st, `chats/${Date.now()}_${file.name}`);
            const s = await uploadBytes(r, file);
            const url = await getDownloadURL(s.ref);
            await addDoc(collection(db, "messages"), {
                uid: user.id, name: user.name, text: file.name, fileUrl: url,
                type: file.type.includes("image") ? "img" : "file",
                reactions: { "😂": 0, "🔥": 0, "❤️": 0 }, time: serverTimestamp()
            });
        };

        window.react = async (id, em) => {
            await updateDoc(doc(db, "messages", id), { [`reactions.${em}`]: increment(1) });
        };

        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(40)), (snap) => {
            chat.innerHTML = "";
            snap.forEach(d => {
                const m = d.data(); if(!m.time) return;
                const isMe = user && m.uid === user.id;
                let body = `<div class="text">${m.text}</div>`;
                if(m.type === "img" || m.type === "gif") body = `<img src="${m.fileUrl || m.text}" class="media">`;
                if(m.type === "file") body = `<a href="${m.fileUrl}" target="_blank" style="color:cyan">📁 ${m.text}</a>`;

                chat.innerHTML += `
                    <div class="msg ${isMe ? 'is-me' : ''}">
                        <div class="author">${m.name}</div>
                        ${body}
                        <div class="reacts">
                            ${Object.entries(m.reactions || {}).map(([e, c]) => `
                                <button class="re-btn" onclick="react('${d.id}', '${e}')">${e} ${c}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        window.addE = (e) => msgInput.value += e;
    </script>
</body>
</html>
