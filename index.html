<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --up: #10b981; --down: #ef4444; --gold: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .reg-box { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        
        .main-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .main-btn:hover { background: #4f46e5; }

        /* Бейджи ролей */
        .badge { font-size: 10px; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; display: inline-block; letter-spacing: 0.5px; }
        .role-admin { background: var(--gold); color: #000; box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .role-vip { background: #ec4899; color: white; }
        .role-user { background: #475569; color: white; }

        /* Список */
        #userList { width: 100%; max-width: 450px; }
        .user-card { background: var(--card); margin-bottom: 12px; padding: 16px; border-radius: 20px; border: 1px solid #334155; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .is-me { border-color: var(--accent); background: #1e294b; }
        
        .avatar { width: 50px; height: 50px; border-radius: 15px; background: #0f172a; border: 1px solid #334155; }
        .info { flex-grow: 1; }
        .info b { display: block; font-size: 16px; margin-bottom: 2px; }

        /* Кнопки для админа */
        .admin-controls { display: flex; gap: 5px; margin-top: 8px; }
        .adm-btn { background: #334155; border: none; color: #cbd5e1; font-size: 10px; padding: 5px 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .adm-btn:hover { background: var(--accent); color: white; }

        .rating-box { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .vote-btn { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; }
        
        .hidden { display: none; }
        .time-label { font-size: 9px; color: #64748b; }
    </style>
</head>
<body>

    <div id="authPanel" class="reg-box">
        <h2 style="margin-top:0">☁️ Cloud Enter</h2>
        <input type="text" id="uName" placeholder="Никнейм">
        <input type="email" id="uEmail" placeholder="Email">
        <button class="main-btn" id="goBtn">ВОЙТИ</button>
    </div>

    <div id="myProfile" class="reg-box hidden">
        <div style="display:flex; align-items:center; gap:15px; text-align:left;">
            <img id="myAv" class="avatar">
            <div>
                <div id="myRoleBadge"></div>
                <h4 id="helloText" style="margin:0"></h4>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:15px; width:100%; background:none; border:1px solid #334155; color:#94a3b8; cursor:pointer; padding:8px; border-radius:10px; font-size:12px;">Выйти из профиля</button>
    </div>

    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, increment, query, onSnapshot, orderBy, limit, getDocs 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let adminId = ""; // Здесь будем хранить ID самого первого юзера

        // Глобальные функции
        window.changeRole = async (targetId, currentRole) => {
            const newRole = currentRole === 'vip' ? 'user' : 'vip';
            await updateDoc(doc(db, "users", targetId), { customRole: newRole });
        };

        window.handleVote = async (userId) => {
            await updateDoc(doc(db, "users", userId), { likes: increment(1) });
        };

        // Вход
        document.getElementById('goBtn').onclick = async () => {
            const email = document.getElementById('uEmail').value.trim();
            const name = document.getElementById('uName').value.trim();
            if (!email || !name) return alert("Заполни все поля!");

            const docId = email.replace(/\./g, '_');
            const userRef = doc(db, "users", docId);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                const newUser = { 
                    name, 
                    email, 
                    likes: 0, 
                    joined: Date.now(), // Используем число для точного сравнения времени
                    customRole: 'user' 
                };
                await setDoc(userRef, newUser);
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...newUser}));
            } else {
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...userSnap.data()}));
            }
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            setTimeout(() => location.reload(), 1000);
        };

        const saved = JSON.parse(localStorage.getItem('cloudUser'));
        if (saved) {
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('myProfile').classList.remove('hidden');
        }

        // ЖИВОЙ МОНИТОРИНГ СПИСКА И ОПРЕДЕЛЕНИЕ АДМИНА
        onSnapshot(query(collection(db, "users"), orderBy("joined", "asc")), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            
            // Самый первый в списке (orderBy asc) — это админ
            const firstDoc = snap.docs[0];
            adminId = firstDoc ? firstDoc.id : "";

            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const isAdmin = uid === adminId;
                const isMe = saved && saved.id === uid;
                
                // Определяем роль для отображения
                const displayRole = isAdmin ? 'admin' : (u.customRole || 'user');
                const dateString = new Date(u.joined).toLocaleDateString();

                // Обновляем шапку своего профиля, если это мы
                if (isMe) {
                    document.getElementById('helloText').innerText = u.name;
                    document.getElementById('myAv').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${u.name}`;
                    document.getElementById('myRoleBadge').innerHTML = `<span class="badge role-${displayRole}">${displayRole}</span>`;
                }

                list.innerHTML += `
                    <div class="user-card ${isMe ? 'is-me' : ''}">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${u.name}" class="avatar">
                        <div class="info">
                            <span class="badge role-${displayRole}">${displayRole}</span>
                            <b>${isAdmin ? '👑 ' : ''}${u.name}</b>
                            <span class="time-label">В облаке с ${dateString}</span>
                            
                            ${saved && saved.id === adminId && !isAdmin ? `
                                <div class="admin-controls">
                                    <button class="adm-btn" onclick="changeRole('${uid}', '${u.customRole}')">
                                        Сделать ${u.customRole === 'vip' ? 'User' : 'VIP'}
                                    </button>
                                </div>
                            ` : ''}
                        </div>
                        <div class="rating-box">
                            <button class="vote-btn" onclick="handleVote('${uid}')">👍 ${u.likes || 0}</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
