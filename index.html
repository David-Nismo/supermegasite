<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Контейнер регистрации */
        .reg-box { width: 100%; max-width: 400px; background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; border: 1px solid #334155; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        
        button { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Список пользователей */
        #userList { width: 100%; max-width: 500px; margin-top: 30px; }
        .user-card { background: var(--card); margin-bottom: 12px; padding: 15px; border-radius: 16px; display: flex; align-items: center; gap: 15px; border: 1px solid #334155; animation: fadeIn 0.5s ease; }
        
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #334155; border: 2px solid var(--accent); }
        .user-info b { display: block; color: var(--accent); font-size: 16px; }
        .user-info span { font-size: 12px; color: #94a3b8; }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authSection" class="reg-box">
        <h2>Welcome</h2>
        <p style="color: #94a3b8; font-size: 14px;">Создай облачный профиль</p>
        <input type="text" id="regName" placeholder="Придумай никнейм">
        <input type="email" id="regEmail" placeholder="Твой Email">
        <button id="regBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
    </div>

    <div id="profileSection" class="reg-box hidden">
        <img id="myAvatar" src="" class="avatar" style="width: 80px; height: 80px; margin-bottom: 10px;">
        <h3 id="welcomeMsg">Привет, !</h3>
        <button onclick="logout()" style="background: #ef4444; padding: 8px;">Выйти</button>
    </div>

    <h4 style="margin-top: 40px; color: #94a3b8;">Все участники в облаке:</h4>
    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, setDoc, doc, query, onSnapshot, orderBy, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Функция выхода
        window.logout = () => {
            localStorage.removeItem('cloudUser');
            location.reload();
        };

        // ПРОВЕРКА: Авторизован ли пользователь?
        const savedUser = JSON.parse(localStorage.getItem('cloudUser'));
        if (savedUser) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('profileSection').classList.remove('hidden');
            document.getElementById('welcomeMsg').innerText = `Привет, ${savedUser.name}!`;
            document.getElementById('myAvatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${savedUser.name}`;
        }

        // РЕГИСТРАЦИЯ
        document.getElementById('regBtn').onclick = async () => {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;

            if (name.length < 2 || !email.includes('@')) return alert("Данные неверны!");

            const userData = { name, email, joined: new Date().toISOString() };
            
            try {
                // Сохраняем в Firebase по уникальному email (вместо ID)
                await setDoc(doc(db, "users", email.replace('.', '_')), {
                    ...userData,
                    timestamp: serverTimestamp()
                });

                // Сохраняем локально, чтобы "помнить" на этом устройстве
                localStorage.setItem('cloudUser', JSON.stringify(userData));
                location.reload();
            } catch (e) {
                alert("Ошибка регистрации. Проверь Rules в Firebase!");
            }
        };

        // ОТОБРАЖЕНИЕ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ (Live Update)
        const q = query(collection(db, "users"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snapshot.forEach((doc) => {
                const user = doc.data();
                const avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.name}`;
                list.innerHTML += `
                    <div class="user-card">
                        <img src="${avatar}" class="avatar">
                        <div class="user-info">
                            <b>${user.name}</b>
                            <span>Зарегистрирован: ${new Date(user.joined).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
