<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.S</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; 
            --accent: #58a6ff; --steam-blue: #1b2838; --discord-blurple: #5865f2;
            --admin-color: #ff7b72; --gold: #f1c40f;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        /* Навигация */
        .navbar { display: flex; background: #010409; border-bottom: 1px solid var(--border); padding: 10px; justify-content: center; gap: 15px; z-index: 10; }
        .nav-btn { cursor: pointer; padding: 8px 15px; border-radius: 6px; transition: 0.3s; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .nav-btn:hover { background: var(--card); }
        .nav-btn.active { color: var(--accent); background: #1f2937; }

        .app { display: flex; height: calc(100vh - 55px); max-width: 900px; margin: 0 auto; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex-direction: column; }

        /* Чат */
        #chat-section { display: flex; flex-direction: column; height: 100%; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .msg { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 12px; max-width: 80%; align-self: flex-start; }
        .is-me { align-self: flex-end; border-color: #238636; background: #23863611; }
        
        /* Системное сообщение об уровне */
        .msg-system {
            align-self: center !important;
            background: linear-gradient(45deg, #f1c40f22, #f39c1222) !important;
            border: 1px solid var(--gold) !important;
            color: var(--gold) !important;
            text-align: center;
            font-weight: bold;
            max-width: 90% !important;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 15px var(--gold); } }

        .author { font-size: 13px; font-weight: bold; color: var(--accent); cursor: pointer; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .del-btn { color: var(--admin-color); font-size: 10px; cursor: pointer; margin-left: auto; font-weight: normal; }

        /* Профиль */
        #profile-section { display: none; padding: 20px; overflow-y: auto; height: 100%; }
        .profile-card { background: var(--steam-blue); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.6); }
        .profile-banner { height: 150px; background: var(--discord-blurple); background-size: cover; background-position: center; transition: 0.5s; }
        .profile-main { padding: 0 20px 20px 20px; position: relative; }
        .profile-avatar { width: 110px; height: 110px; border-radius: 10px; border: 4px solid var(--card); margin-top: -55px; background: #333; z-index: 2; object-fit: cover; }
        
        .xp-container { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #444; }
        .xp-bar { height: 14px; background: #000; border-radius: 7px; overflow: hidden; border: 1px solid #333; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #58a6ff, #bc8cf2); width: 0%; transition: 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Выбор аватара */
        #avatar-picker { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; }
        .av-option { width: 65px; height: 65px; cursor: pointer; border-radius: 10px; border: 2px solid transparent; transition: 0.2s; background: #222; }
        .av-option:hover { transform: translateY(-5px); border-color: var(--accent); }
        .av-active { border-color: var(--accent) !important; box-shadow: 0 0 10px var(--accent); }

        /* Ввод */
        .input-box { background: var(--card); border-top: 1px solid var(--border); padding: 15px; }
        .input-row { display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: #238636; border: none; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: #2ea043; }

        .hidden { display: none !important; }
        input[type="text"], textarea { background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; margin-top: 8px; outline: none; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:320px;">
            <h2 style="margin-top:0; color:var(--accent);">Cloud OS v12</h2>
            <input type="text" id="nick" placeholder="Придумайте ник">
            <input type="text" id="mail" placeholder="Ваш Email (для входа)">
            <button onclick="login()" class="send-btn" style="width:100%; margin-top:20px; height:50px;">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-btn active" id="btn-chat" onclick="switchTab('chat')">Чат</div>
        <div class="nav-btn" id="btn-profile" onclick="switchTab('profile')">Профиль</div>
    </nav>

    <div class="app">
        <section id="chat-section">
            <div id="chat"></div>
            <div class="input-box">
                <div class="input-row">
                    <input type="text" id="msgInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') send()">
                    <button onclick="send()" class="send-btn">ОТПРАВИТЬ</button>
                </div>
            </div>
        </section>

        <section id="profile-section">
            <div class="profile-card">
                <div class="profile-banner" id="p-banner"></div>
                <div class="profile-main">
                    <img id="p-avatar" src="" class="profile-avatar">
                    <h1 id="p-name" style="margin: 10px 0 5px 0;">Загрузка...</h1>
                    <p id="p-bio" style="margin:0; color:#8b949e; font-style:italic;">Загрузка био...</p>
                    
                    <div class="xp-container">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold;">
                            <span style="color:var(--gold);">LEVEL <span id="p-lvl">1</span></span>
                            <span id="p-xp-text" style="font-size:12px; letter-spacing:1px;">0 / 150 XP</span>
                        </div>
                        <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
                    </div>

                    <div id="edit-controls">
                        <h4 style="margin:15px 0 5px 0; color:var(--accent);">Выберите облик (Avatar)</h4>
                        <div id="avatar-picker"></div>
                        <input type="hidden" id="selected-avatar-url">

                        <h4 style="margin:20px 0 5px 0; color:var(--accent);">Персонализация</h4>
                        <textarea id="edit-bio-input" placeholder="Пару слов о себе..."></textarea>
                        <input type="text" id="edit-banner-input" placeholder="Ссылка на фон профиля (URL)">
                        <button onclick="saveProfile()" class="send-btn" style="margin-top:20px; width:100%; background:#238636;">СОХРАНИТЬ И ОБНОВИТЬ</button>
                    </div>
                    <button id="back-to-my" class="hidden" onclick="loadProfileData(currentUser.id)" style="margin-top:15px; background:#444; border:none; color:white; padding:12px; border-radius:8px; width:100%; cursor:pointer; font-weight:bold;">ВЕРНУТЬСЯ В МОЙ ПРОФИЛЬ</button>
                </div>
            </div>
        </section>

        <section id="admin-section" style="display:none; padding:20px;">
            <h2 style="color:var(--admin-color);">Root Access</h2>
            <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--admin-color);">
                <p>Вы авторизованы как администратор системы.</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, deleteDoc, query, onSnapshot, orderBy, limit, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const ADMIN_EMAIL = "240130@turan-edu.kz";
        let currentUser = JSON.parse(localStorage.getItem('cloudUser'));

        // Вход
        window.login = async () => {
            const n = document.getElementById('nick').value, e = document.getElementById('mail').value.trim();
            if(!n || !e) return alert("Заполните все поля!");
            const id = e.replace(/\./g, '_');
            
            const userRef = doc(db, "users", id);
            const userSnap = await getDoc(userRef);
            let userData = userSnap.exists() ? userSnap.data() : { name: n, email: e, xp: 0, level: 1, bio: "Пользователь Cloud OS", banner: "", avatar: "" };
            
            await setDoc(userRef, userData, { merge: true });
            localStorage.setItem('cloudUser', JSON.stringify({id, ...userData}));
            location.reload();
        };

        if(currentUser) {
            document.getElementById('auth').classList.add('hidden');
            if(currentUser.email === ADMIN_EMAIL) {
                const adminBtn = document.createElement('div');
                adminBtn.className = 'nav-btn'; adminBtn.style.color = 'var(--admin-color)'; adminBtn.innerText = 'Root';
                adminBtn.onclick = () => switchTab('admin');
                document.getElementById('main-nav').appendChild(adminBtn);
            }
            renderAvatarPicker();
        }

        // Навигация
        window.switchTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').style.display = (tab === 'chat' ? 'flex' : 'block');
            if(tab === 'profile') loadProfileData(currentUser.id);
            document.getElementById('btn-' + tab)?.classList.add('active');
        };

        // Загрузка профиля (Исправлен NaN и undefined)
        async function loadProfileData(uid) {
            const snap = await getDoc(doc(db, "users", uid));
            if(!snap.exists()) return;
            const d = snap.data();
            
            const lvl = parseInt(d.level) || 1;
            const xp = parseInt(d.xp) || 0;
            const nextXp = lvl * 150;

            document.getElementById('p-name').innerText = d.name || "Аноним";
            document.getElementById('p-bio').innerText = d.bio || "Био не заполнено";
            document.getElementById('p-lvl').innerText = lvl;
            document.getElementById('p-avatar').src = d.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${d.name}`;
            document.getElementById('p-banner').style.backgroundImage = d.banner ? `url(${d.banner})` : '';
            document.getElementById('p-xp-text').innerText = `${xp} / ${nextXp} XP`;
            document.getElementById('xp-fill').style.width = Math.min((xp / nextXp * 100), 100) + "%";

            const isOwn = uid === currentUser.id;
            document.getElementById('edit-controls').className = isOwn ? "" : "hidden";
            document.getElementById('back-to-my').className = isOwn ? "hidden" : "send-btn";
        }

        // Выбор аватара
        function renderAvatarPicker() {
            const picker = document.getElementById('avatar-picker');
            const styles = ['avataaars', 'bottts', 'adventurer', 'pixel-art'];
            picker.innerHTML = "";
            styles.forEach(s => {
                const url = `https://api.dicebear.com/7.x/${s}/svg?seed=${s}-${currentUser.id}`;
                const img = document.createElement('img');
                img.src = url; img.className = "av-option";
                img.onclick = () => {
                    document.querySelectorAll('.av-option').forEach(el => el.classList.remove('av-active'));
                    img.classList.add('av-active');
                    document.getElementById('selected-avatar-url').value = url;
                };
                picker.appendChild(img);
            });
        }

        window.saveProfile = async () => {
            const bio = document.getElementById('edit-bio-input').value;
            const bnr = document.getElementById('edit-banner-input').value;
            const avat = document.getElementById('selected-avatar-url').value;
            const updateData = { bio, banner: bnr };
            if(avat) updateData.avatar = avat;
            await updateDoc(doc(db, "users", currentUser.id), updateData);
            alert("Профиль успешно обновлен!");
            loadProfileData(currentUser.id);
        };

        // Отправка + Опыт + Салюты
        window.send = async () => {
            const txt = document.getElementById('msgInput').value.trim();
            if(!txt || !currentUser) return;
            document.getElementById('msgInput').value = "";

            // 1. Сообщение
            await addDoc(collection(db, "messages"), {
                uid: currentUser.id, name: currentUser.name, text: txt,
                time: serverTimestamp(), type: "user"
            });

            // 2. Расчет опыта
            const uRef = doc(db, "users", currentUser.id);
            const uSnap = await getDoc(uRef);
            let { xp = 0, level = 1 } = uSnap.data();
            xp = parseInt(xp) + 10;

            if(xp >= level * 150) { 
                xp = 0; level++; 
                // Эффект Салюта
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#58a6ff', '#f1c40f'] });
                // Системное сообщение
                await addDoc(collection(db, "messages"), {
                    uid: "system", name: "System", type: "system",
                    text: `🎉 УРА! ${currentUser.name} повысил свой уровень до ${level}! 🎉`,
                    time: serverTimestamp()
                });
            }
            await updateDoc(uRef, { xp: parseInt(xp), level: parseInt(level) });
        };

        window.deleteMsg = async (id) => {
            if(confirm("Удалить сообщение навсегда?")) await deleteDoc(doc(db, "messages", id));
        };

        // Слушатель чата
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(50)), (snap) => {
            const chatDiv = document.getElementById('chat');
            chatDiv.innerHTML = "";
            snap.forEach(d => {
                const m = d.data(); if(!m.time) return;
                const isMe = m.uid === currentUser.id;
                const isSys = m.type === "system";
                chatDiv.innerHTML += `
                    <div class="msg ${isMe ? 'is-me' : ''} ${isSys ? 'msg-system' : ''}" id="m-${d.id}">
                        ${!isSys ? `
                            <div class="author" onclick="viewUser('${m.uid}')">
                                ${m.name}
                                ${ (currentUser.email === ADMIN_EMAIL) ? `<span class="del-btn" onclick="event.stopPropagation(); deleteMsg('${d.id}')">УДАЛИТЬ</span>` : '' }
                            </div>
                        ` : ''}
                        <div class="text">${m.text}</div>
                    </div>
                `;
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        window.viewUser = (uid) => { switchTab('profile'); loadProfileData(uid); };
    </script>
</body>
</html>
