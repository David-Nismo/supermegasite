<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>S.M.S v2.5</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #c9d1d9; font-family: sans-serif; }
        
        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; border: 1px solid var(--border); }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Сообщение */
        .msg-row { background: var(--card); padding: 12px; border-radius: 10px; border: 1px solid var(--border); position: relative; max-width: 85%; }
        .is-me { align-self: flex-end; border-color: #238636; background: #23863611; }

        /* Реакции */
        .reactions { display: flex; gap: 5px; margin-top: 8px; }
        .re-btn { background: #30363d; border: none; border-radius: 12px; padding: 2px 8px; color: white; cursor: pointer; font-size: 12px; }
        .re-btn:hover { background: #444; }

        /* Медиа */
        .msg-img { max-width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        .file-link { color: var(--accent); display: block; margin-top: 5px; text-decoration: none; font-size: 13px; }

        /* Панель ввода */
        .input-area { padding: 15px; background: var(--card); border-top: 1px solid var(--border); }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .tool-btn { background: none; border: none; cursor: pointer; font-size: 18px; filter: grayscale(1); transition: 0.2s; }
        .tool-btn:hover { filter: grayscale(0); transform: scale(1.2); }
        
        .flex-row { display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: #010409; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="chatMessages"></div>

        <div class="input-area">
            <div class="controls">
                <button class="tool-btn" onclick="addEmoji('😂')">😂</button>
                <button class="tool-btn" onclick="addEmoji('🔥')">🔥</button>
                <button class="tool-btn" onclick="addEmoji('❤️')">❤️</button>
                <button class="tool-btn" onclick="document.getElementById('fileInp').click()">📎</button>
                <button class="tool-btn" onclick="sendGif()">🖼️ GIF</button>
            </div>
            <div class="flex-row">
                <input type="file" id="fileInp" class="hidden" onchange="uploadFile(this)">
                <input type="text" id="msgInput" placeholder="Сообщение или ссылка на GIF..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" style="background:#238636; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, updateDoc, query, onSnapshot, orderBy, limit, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

        const firebaseConfig = { /* ТВОЙ КОНФИГ ТУТ */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);
        let user = JSON.parse(localStorage.getItem('cloudUser'));

        // Отправка текста или GIF
        window.send = async () => {
            const inp = document.getElementById('msgInput');
            const val = inp.value.trim();
            if(!val || !user) return;

            let type = "text";
            if(val.includes("giphy.com") || val.endsWith(".gif")) type = "gif";

            await addDoc(collection(db, "messages"), {
                uid: user.id, name: user.name, text: val, type: type,
                reactions: { "🔥": 0, "❤️": 0, "😂": 0 },
                time: serverTimestamp()
            });
            inp.value = "";
        };

        // Загрузка файла
        window.uploadFile = async (input) => {
            const file = input.files[0];
            if(!file || !user) return;
            
            const fileRef = ref(storage, `uploads/${Date.now()}_${file.name}`);
            const snap = await uploadBytes(fileRef, file);
            const url = await getDownloadURL(snap.ref);

            await addDoc(collection(db, "messages"), {
                uid: user.id, name: user.name, 
                text: file.name, fileUrl: url, 
                type: file.type.includes("image") ? "image" : "file",
                reactions: { "🔥": 0, "❤️": 0, "😂": 0 },
                time: serverTimestamp()
            });
        };

        // Реакции
        window.react = async (msgId, emoji, currentCount) => {
            const msgRef = doc(db, "messages", msgId);
            await updateDoc(msgRef, {
                [`reactions.${emoji}`]: (currentCount || 0) + 1
            });
        };

        // Рендеринг
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(50)), (snap) => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = user && m.uid === user.id;
                let content = `<div class="msg-text">${m.text}</div>`;

                if(m.type === "image" || m.type === "gif") content = `<img src="${m.fileUrl || m.text}" class="msg-img">`;
                if(m.type === "file") content = `<a href="${m.fileUrl}" target="_blank" class="file-link">📁 ${m.text}</a>`;

                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'is-me' : ''}">
                        <div style="font-size:11px; color:var(--accent); font-weight:bold;">${m.name}</div>
                        ${content}
                        <div class="reactions">
                            ${Object.entries(m.reactions || {}).map(([emoji, count]) => `
                                <button class="re-btn" onclick="react('${d.id}', '${emoji}', ${count})">${emoji} ${count}</button>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
        });

        window.addEmoji = (e) => document.getElementById('msgInput').value += e;
        window.sendGif = () => {
            const url = prompt("Вставь ссылку на GIF:");
            if(url) { document.getElementById('msgInput').value = url; send(); }
        };
    </script>
</body>
</html>
