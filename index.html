<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Chat Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        #login-block { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; margin-top: 80px; text-align: center; }
        #login-block input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #login-block button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        #google-btn { background: white !important; color: #444 !important; border: 1px solid #ddd !important; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; }
        #google-btn img { width: 18px; }
        .main-container { display: flex; width: 100%; max-width: 1000px; height: 90vh; background: white; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee; font-weight: bold; }
        #users-container { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; gap: 10px; position: relative; }
        .user-item:hover { background: #f0f7ff; }
        .unread-badge { width: 10px; height: 10px; background: #ff4d4d; border-radius: 50%; position: absolute; right: 20px; }
        .chat-window { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; background: #f4f7f6; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 65%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; word-wrap: break-word; }
        .sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; border: 1px solid #eee; }
        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #eee; background: #fff; }
        .input-area input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .input-area button { background: #007bff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        #logout-btn { margin: 10px; background: #ff4d4d; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-block">
        <h2>Welcome</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Пароль">
        <button id="auth-btn">Войти / Регистрация</button>
        <button id="google-btn">
            <img src="https://www.google.com/favicon.ico">
            Войти через Google
        </button>
    </div>

    <div id="chat-block" class="main-container hidden">
        <div class="sidebar">
            <div class="sidebar-header">Чаты</div>
            <div id="users-container"></div>
            <button id="logout-btn">Выйти</button>
        </div>
        <div class="chat-window hidden" id="chat-window">
            <div class="chat-header">
                <span id="chat-with-title" style="font-weight: bold;"></span>
            </div>
            <div class="messages-box" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button id="send-btn">➤</button>
            </div>
        </div>
        <div id="empty-chat-msg" style="flex:1; display:flex; align-items:center; justify-content:center; color:#999;">
            Выберите чат
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://sdlqiegoazscsperolgz.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_HhVXiEyvOjBLchlzaWydtQ_72hVDYOu'
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

        let currentUser = null;
        let recipientId = null;

        // --- AUTH ---
        
        // Вход через Google
        document.getElementById('google-btn').onclick = async () => {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://david-nismo.github.io/supermegasite/' }
            });
            if (error) alert(error.message);
        };

        // Вход/Регистрация (Email)
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            let { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                const { data: signData, error: signError } = await supabase.auth.signUp({ email, password });
                if (signError) alert(signError.message);
                else alert('Регистрация успешна! Теперь вы можете войти.');
            }
        };

        // Функция обработки успешного входа
        async function handleLogin(user) {
            currentUser = user;
            
            // Сохраняем профиль в таблицу profiles
            const { error: profileError } = await supabase.from('profiles').upsert({ 
                id: currentUser.id, 
                username: currentUser.user_metadata?.full_name || currentUser.email.split('@')[0],
                email: currentUser.email 
            });

            if (profileError) console.error("Ошибка сохранения профиля:", profileError.message);
            
            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('chat-block').classList.remove('hidden');
            loadUsers();
        }

        // Проверка: был ли юзер уже авторизован при обновлении страницы
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            handleLogin(session.user);
        }

        // Следим за состоянием входа/выхода
        supabase.auth.onAuthStateChange(async (event, session) => {
            if (event === 'SIGNED_IN' && session) {
                handleLogin(session.user);
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                document.getElementById('login-block').classList.remove('hidden');
                document.getElementById('chat-block').classList.add('hidden');
            }
        });

        document.getElementById('logout-btn').onclick = () => supabase.auth.signOut();

        // --- CHAT LOGIC ---

        async function loadUsers() {
            const { data: users, error } = await supabase.from('profiles').select('*');
            if (error) {
                console.error("Ошибка загрузки пользователей:", error.message);
                return;
            }

            const container = document.getElementById('users-container');
            container.innerHTML = '';
            
            users.forEach(user => {
                if (user.id !== currentUser.id) {
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `<span>${user.username || user.email}</span>`;
                    div.onclick = () => openChat(user.id, user.username || user.email);
                    container.appendChild(div);
                }
            });
        }

        async function openChat(id, name) {
            recipientId = id;
            document.getElementById('chat-window').classList.remove('hidden');
            document.getElementById('empty-chat-msg').classList.add('hidden');
            document.getElementById('chat-with-title').innerText = name;
            loadMessages();

            // Подписка на новые сообщения
            supabase.removeAllChannels(); // Очищаем старые подписки, чтобы не дублировались
            supabase
                .channel('room-messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    if (
                        (payload.new.sender_id === currentUser.id && payload.new.recipient_id === recipientId) ||
                        (payload.new.sender_id === recipientId && payload.new.recipient_id === currentUser.id)
                    ) {
                        renderMessage(payload.new);
                    }
                })
                .subscribe();
        }

        async function loadMessages() {
            const { data: msgs, error } = await supabase
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${currentUser.id},recipient_id.eq.${recipientId}),and(sender_id.eq.${recipientId},recipient_id.eq.${currentUser.id})`)
                .order('created_at', { ascending: true });

            if (error) console.error("Ошибка загрузки сообщений:", error.message);

            const box = document.getElementById('messages-box');
            box.innerHTML = '';
            if (msgs) msgs.forEach(renderMessage);
        }

        function renderMessage(m) {
            const box = document.getElementById('messages-box');
            const d = document.createElement('div');
            d.className = `msg ${m.sender_id === currentUser.id ? 'sent' : 'received'}`;
            d.innerText = m.text;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        }

        const sendMsg = async () => {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !recipientId) return;

            const { error } = await supabase.from('messages').insert({
                text: text,
                sender_id: currentUser.id,
                recipient_id: recipientId
            });

            if (error) console.error("Ошибка отправки:", error.message);
            else input.value = '';
        };

        document.getElementById('send-btn').onclick = sendMsg;
        document.getElementById('msg-input').onkeydown = (e) => { if (e.key === 'Enter') sendMsg(); };

    </script>
</body>
</html>
