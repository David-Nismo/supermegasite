<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        
        /* Индикатор онлайна */
        .status { font-size: 12px; color: #10b981; display: flex; align-items: center; margin-bottom: 10px; }
        .pulse { width: 8px; height: 8px; background: #10b981; border-radius: 50%; margin-right: 8px; animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        button#mainBtn { background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button#mainBtn:hover { background: #2563eb; transform: scale(1.02); }

        .post { background: #1e293b; border: 1px solid #334155; padding: 20px; margin-top: 15px; border-radius: 15px; width: 100%; max-width: 450px; position: relative; transition: 0.3s; }
        .post:hover { border-color: #3b82f6; }
        
        .like-btn { cursor: pointer; border: none; background: #334155; color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; transition: 0.2s; margin-top: 10px; }
        .like-btn:hover { background: #475569; }
        .time { font-size: 11px; color: #64748b; float: right; }
        b { color: #3b82f6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="status"><div class="pulse"></div> Облако активно (Live)</div>
        <h3>Новая запись</h3>
        <input type="text" id="name" placeholder="Твой ник">
        <input type="email" id="email" placeholder="Твой Email">
        <button id="mainBtn">ОТПРАВИТЬ</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 450px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ФУНКЦИЯ 1: Обработка лайка + Конфетти
        window.processLike = async (id, currentLikes) => {
            const docRef = doc(db, "requests", id);
            try {
                // Если после этого клика будет 5, 10, 15... лайков — бабах!
                if ((currentLikes + 1) % 5 === 0) {
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) { console.error(e); }
        };

        // Запись данных
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return;

            await addDoc(collection(db, "requests"), {
                name, email, likes: 0, timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        };

        // ФУНКЦИЯ 2: Real-time поток (с эффектом появления)
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const l = data.likes || 0;
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || "секунду..."}</span>
                        <b>@${data.name}</b>
                        <p style="margin: 5px 0; color: #94a3b8;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}', ${l})">🔥 ${l}</button>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
