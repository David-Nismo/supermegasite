<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDM Market</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0d1117; --card: #161b22; --border: #30363d; 
            --accent: #58a6ff; --price: #39d353; --admin-color: #ff7b72;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #c9d1d9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

        .navbar { display: flex; background: #010409; border-bottom: 1px solid var(--border); padding: 10px; justify-content: center; gap: 15px; z-index: 10; }
        .nav-btn { cursor: pointer; padding: 8px 15px; border-radius: 6px; transition: 0.3s; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .nav-btn:hover { background: var(--card); }
        .nav-btn.active { color: var(--accent); background: #1f2937; }

        .app { display: flex; height: calc(100vh - 55px); max-width: 900px; margin: 0 auto; background: var(--bg); border-left: 1px solid var(--border); border-right: 1px solid var(--border); flex-direction: column; }

        /* Лента объявлений */
        #feed-section { display: flex; flex-direction: column; height: 100%; }
        #feed { flex-grow: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { #feed { grid-template-columns: 1fr; } }

        .car-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .car-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .car-img { width: 100%; height: 180px; object-fit: cover; background: #000; }
        .car-info { padding: 15px; }
        .car-title { font-size: 18px; font-weight: bold; margin: 0; color: white; }
        .car-price { color: var(--price); font-weight: bold; font-size: 16px; margin: 5px 0; }
        .car-desc { font-size: 13px; color: #8b949e; line-height: 1.4; }
        .car-seller { font-size: 11px; margin-top: 10px; color: var(--accent); border-top: 1px solid var(--border); padding-top: 10px; display: flex; justify-content: space-between; }

        /* Форма ввода */
        .input-box { background: var(--card); border-top: 1px solid var(--border); padding: 15px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        input, textarea { background: #010409; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; outline: none; width: 100%; box-sizing: border-box; }
        .post-btn { background: #238636; border: none; color: white; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        #profile-section { display: none; padding: 20px; overflow-y: auto; height: 100%; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="auth" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; border:1px solid var(--border); text-align:center; width:320px;">
            <h2 style="margin-top:0; color:var(--accent);">JDM Market Login</h2>
            <input type="text" id="nick" placeholder="Ваше имя">
            <input type="text" id="mail" placeholder="Email" style="margin-top:10px;">
            <button onclick="login()" class="post-btn" style="margin-top:20px;">ВОЙТИ</button>
        </div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-btn active" id="btn-feed" onclick="switchTab('feed')">Объявления</div>
        <div class="nav-btn" id="btn-profile" onclick="switchTab('profile')">Профиль</div>
    </nav>

    <div class="app">
        <section id="feed-section">
            <div id="feed"></div>
            <div class="input-box">
                <div class="input-grid">
                    <input type="text" id="carModel" placeholder="Марка/Модель (напр. Silvia S15)">
                    <input type="text" id="carPrice" placeholder="Цена (тг/$)">
                </div>
                <input type="text" id="carImg" placeholder="Ссылка на фото (URL)" style="margin-bottom:10px;">
                <textarea id="carDesc" placeholder="Описание состояния, тюнинг..."></textarea>
                <button onclick="postAd()" class="post-btn" style="margin-top:10px;">ОПУБЛИКОВАТЬ</button>
            </div>
        </section>

        <section id="profile-section">
            <h2 style="text-align:center">Ваш профиль в разработке</h2>
            <button onclick="switchTab('feed')" class="post-btn">Назад к машинам</button>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, query, onSnapshot, orderBy, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = JSON.parse(localStorage.getItem('cloudUser'));

        window.login = async () => {
            const n = document.getElementById('nick').value, e = document.getElementById('mail').value.trim();
            if(!n || !e) return alert("Заполните поля!");
            const id = e.replace(/\./g, '_');
            const userData = { name: n, email: e };
            await setDoc(doc(db, "users", id), userData, { merge: true });
            localStorage.setItem('cloudUser', JSON.stringify({id, ...userData}));
            location.reload();
        };

        if(currentUser) document.getElementById('auth').classList.add('hidden');

        window.switchTab = (tab) => {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').style.display = (tab === 'feed' ? 'flex' : 'block');
            document.getElementById('btn-' + tab).classList.add('active');
        };

        window.postAd = async () => {
            const model = document.getElementById('carModel').value;
            const price = document.getElementById('carPrice').value;
            const img = document.getElementById('carImg').value || 'https://via.placeholder.com/400x200?text=No+Photo';
            const desc = document.getElementById('carDesc').value;

            if(!model || !price) return alert("Укажите модель и цену!");

            await addDoc(collection(db, "ads"), {
                uid: currentUser.id, seller: currentUser.name,
                model, price, img, desc, time: serverTimestamp()
            });

            document.querySelectorAll('.input-box input, .input-box textarea').forEach(i => i.value = "");
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 } });
        };

        onSnapshot(query(collection(db, "ads"), orderBy("time", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(d => {
                const ad = d.data();
                feed.innerHTML += `
                    <div class="car-card">
                        <img src="${ad.img}" class="car-img" onerror="this.src='https://via.placeholder.com/400x200?text=Image+Error'">
                        <div class="car-info">
                            <p class="car-title">${ad.model}</p>
                            <p class="car-price">${ad.price}</p>
                            <p class="car-desc">${ad.desc}</p>
                            <div class="car-seller">
                                <span>Продавец: ${ad.seller}</span>
                                ${ad.uid === currentUser.id ? `<span style="cursor:pointer;color:red" onclick="deleteAd('${d.id}')">Удалить</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });
        });

        window.deleteAd = async (id) => {
            if(confirm("Удалить объявление?")) await deleteDoc(doc(db, "ads", id));
        };
    </script>
</body>
</html>
