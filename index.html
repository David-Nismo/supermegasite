<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.S</title>
    <style>
        :root { --bg: #0d1117; --side: #161b22; --border: #30363d; --accent: #6366f1; }
        
        /* Глобальный сброс */
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; }

        /* Главная сетка */
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; }

        /* ЛЕВАЯ ПАНЕЛЬ */
        .sidebar { width: 280px; background: var(--side); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
        .user-card { background: #010409; padding: 12px; border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

        /* ЦЕНТРАЛЬНАЯ ОБЛАСТЬ ЧАТА */
        .chat-section { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        
        /* ЗОНА СООБЩЕНИЙ (ГЛАВНОЕ ИСПРАВЛЕНИЕ) */
        #chatMessages { 
            flex-grow: 1; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; /* Строго в колонку */
            padding: 20px; 
            gap: 12px;
            /* Убеждаемся, что сообщения не вылетают */
            position: relative; 
        }

        /* ПУЗЫРЬКИ СООБЩЕНИЙ */
        .msg { 
            position: relative; /* НИКАКИХ ABSOLUTE */
            max-width: 70%; 
            padding: 10px 16px; 
            border-radius: 15px; 
            font-size: 15px; 
            line-height: 1.4; 
            word-wrap: break-word;
            border: 1px solid var(--border);
        }

        /* Свои сообщения - Справа */
        .msg.is-me { 
            align-self: flex-end; 
            background: #23863633; 
            border-color: #238636; 
            border-bottom-right-radius: 2px;
        }

        /* Чужие сообщения - Слева */
        .msg.is-not-me { 
            align-self: flex-start; 
            background: #21262d; 
            border-bottom-left-radius: 2px;
        }

        .msg b { display: block; font-size: 11px; margin-bottom: 4px; color: var(--accent); }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .input-wrap { padding: 20px; background: var(--side); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: #0d1117; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* АДМИНКА */
        .adm-btn { position: fixed; top: 20px; right: 20px; background: gold; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 999; font-size: 20px; }
        .adm-panel { position: fixed; top: 70px; right: 20px; width: 250px; background: var(--side); border: 1px solid var(--border); padding: 15px; border-radius: 12px; z-index: 999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .hidden { display: none !important; }
        #authOverlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div style="background:var(--side); padding:40px; border-radius:20px; border:1px solid var(--border); width:350px; text-align:center;">
            <h2 style="margin-bottom:25px">Cloud Login</h2>
            <input type="text" id="regName" placeholder="Никнейм" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; background:#0d1117; color:white; border:1px solid var(--border);">
            <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; background:#0d1117; color:white; border:1px solid var(--border);">
            <button onclick="login()" class="send-btn" style="height:45px; width:100%">ВОЙТИ</button>
        </div>
    </div>

    <div class="app-container">
        <div class="sidebar">
            <h3 style="margin:0 0 20px 0">👥 Участники</h3>
            <div id="userList" style="flex-grow:1; overflow-y:auto;"></div>
            <button onclick="localStorage.clear(); location.reload();" style="border:1px solid red; background:none; color:red; padding:10px; border-radius:8px; cursor:pointer;">Выход</button>
        </div>

        <div class="chat-section">
            <div id="chatMessages"></div>
            <div class="input-wrap">
                <input type="text" id="msgInput" placeholder="Ваше сообщение..." onkeypress="if(event.key==='Enter') send()">
                <button onclick="send()" class="send-btn">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>

    <button id="admBtn" class="adm-btn hidden" onclick="document.getElementById('admPanel').classList.toggle('hidden')">🛡️</button>
    <div id="admPanel" class="adm-panel hidden">
        <h4 style="margin:0 0 10px 0">Админка</h4>
        <div id="admUsers"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, query, onSnapshot, orderBy, limit, addDoc, deleteDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const SUPER_ADMIN = "240130@turan-edu.kz"; // Твой админский email

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let me = JSON.parse(localStorage.getItem('cloudUser'));

        window.login = async () => {
            const n = document.getElementById('regName').value;
            const e = document.getElementById('regEmail').value.trim();
            if(!n || !e) return;
            const id = e.replace(/\./g, '_');
            const ref = doc(db, "users", id);
            if(!(await getDoc(ref)).exists()) {
                await setDoc(ref, { name: n, email: e, xp: 0, joined: Date.now(), muted: false });
            }
            localStorage.setItem('cloudUser', JSON.stringify({id, name: n, email: e}));
            location.reload();
        };

        if(me) {
            document.getElementById('authOverlay').classList.add('hidden');
            if(me.email === SUPER_ADMIN) document.getElementById('admBtn').classList.remove('hidden');
        }

        window.send = async () => {
            const inp = document.getElementById('msgInput');
            if(!inp.value.trim() || !me) return;
            const t = inp.value; inp.value = "";
            await addDoc(collection(db, "messages"), { uid: me.id, name: me.name, text: t, time: serverTimestamp() });
            await updateDoc(doc(db, "users", me.id), { xp: increment(10) });
        };

        // ЧАТ - ИСПРАВЛЕННЫЙ РЕНДЕРИНГ
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(100)), (snap) => {
            const box = document.getElementById('chatMessages');
            box.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                if(!m.time) return;
                const isMe = me && m.uid === me.id;
                // Создаем элемент через innerHTML, НО без абсолютного позиционирования
                box.innerHTML += `
                    <div class="msg ${isMe ? 'is-me' : 'is-not-me'}">
                        <b>${m.name}</b>
                        <span>${m.text}</span>
                    </div>
                `;
            });
            box.scrollTop = box.scrollHeight;
        });

        // УЧАСТНИКИ
        onSnapshot(collection(db, "users"), (snap) => {
            const uList = document.getElementById('userList');
            const admList = document.getElementById('admUsers');
            uList.innerHTML = ""; admList.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                uList.innerHTML += `<div class="user-card"><span>${u.name}</span> <span style="color:gold; font-size:10px;">LVL ${Math.floor(u.xp/100)}</span></div>`;
                if(me && me.email === SUPER_ADMIN && u.email !== SUPER_ADMIN) {
                    admList.innerHTML += `<div style="font-size:12px; margin-bottom:5px;">${u.name} <button onclick="mute('${d.id}', ${!u.muted})">${u.muted ? '🔊' : '🔇'}</button></div>`;
                }
            });
        });

        window.mute = async (id, s) => await updateDoc(doc(db, "users", id), { muted: s });

        // ПРОВЕРКА МУТА
        if(me) {
            onSnapshot(doc(db, "users", me.id), (d) => {
                const u = d.data();
                if(u && u.muted) {
                    document.getElementById('msgInput').disabled = true;
                    document.getElementById('msgInput').placeholder = "Вам запрещено писать";
                }
            });
        }
    </script>
</body>
</html>
