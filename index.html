<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --up: #10b981; --down: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .reg-box { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        
        .main-btn { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Список профилей */
        #userList { width: 100%; max-width: 450px; }
        .user-card { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 16px; border: 1px solid #334155; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        
        .avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--accent); }
        .info { flex-grow: 1; }
        .info b { color: var(--accent); font-size: 16px; display: block; }
        
        /* Кнопки рейтинга */
        .rating-box { display: flex; gap: 8px; }
        .vote-btn { background: #0f172a; border: 1px solid #334155; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .vote-btn:hover { background: #334155; }
        .btn-up:hover { border-color: var(--up); color: var(--up); }
        .btn-down:hover { border-color: var(--down); color: var(--down); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="authPanel" class="reg-box">
        <h3>Регистрация / Вход</h3>
        <input type="text" id="uName" placeholder="Никнейм (для новых)">
        <input type="email" id="uEmail" placeholder="Ваш Email">
        <button class="main-btn" id="goBtn">ВОЙТИ В ОБЛАКО</button>
    </div>

    <div id="myProfile" class="reg-box hidden">
        <h4 id="helloText"></h4>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid #444; color:#94a3b8; padding:5px 10px; border-radius:8px; cursor:pointer;">Выйти</button>
    </div>

    <h3 style="color: #94a3b8;">Рейтинг участников:</h3>
    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, increment, query, onSnapshot, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ФУНКЦИЯ ГОЛОСОВАНИЯ
        window.handleVote = async (userId, type) => {
            const userRef = doc(db, "users", userId);
            try {
                await updateDoc(userRef, {
                    [type]: increment(1)
                });
            } catch (e) { console.error("Ошибка голосования:", e); }
        };

        // ЛОГИКА ВХОДА / РЕГИСТРАЦИИ
        document.getElementById('goBtn').onclick = async () => {
            const email = document.getElementById('uEmail').value.trim();
            const name = document.getElementById('uName').value.trim();
            if (!email) return alert("Email обязателен!");

            const docId = email.replace(/\./g, '_');
            const userRef = doc(db, "users", docId);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                localStorage.setItem('cloudUser', JSON.stringify(userSnap.data()));
            } else {
                if (!name) return alert("Вы новый пользователь, введите Никнейм!");
                const newUser = { name, email, likes: 0, dislikes: 0, joined: new Date().toISOString() };
                await setDoc(userRef, newUser);
                localStorage.setItem('cloudUser', JSON.stringify(newUser));
            }
            location.reload();
        };

        // ПРОВЕРКА СЕССИИ
        const saved = JSON.parse(localStorage.getItem('cloudUser'));
        if (saved) {
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('myProfile').classList.remove('hidden');
            document.getElementById('helloText').innerText = `Вы зашли как: ${saved.name}`;
        }

        // ЖИВОЙ ВЫВОД НИКНЕЙМОВ И РЕЙТИНГА
        onSnapshot(query(collection(db, "users"), orderBy("joined", "desc")), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const avatar = `https://api.dicebear.com/7.x/bottts/svg?seed=${u.name}`;
                
                list.innerHTML += `
                    <div class="user-card">
                        <img src="${avatar}" class="avatar">
                        <div class="info">
                            <b>${u.name}</b>
                            <div class="rating-box">
                                <button class="vote-btn btn-up" onclick="handleVote('${uid}', 'likes')">
                                    👍 ${u.likes || 0}
                                </button>
                                <button class="vote-btn btn-down" onclick="handleVote('${uid}', 'dislikes')">
                                    👎 ${u.dislikes || 0}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
