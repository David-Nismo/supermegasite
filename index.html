<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0b0f1a; --card: #161b22; --admin: #f59e0b; --danger: #f85149; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--card); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .user-card { background: #0d1117; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #30363d; }
        .is-admin-card { border-color: var(--admin); background: #1c1910; }
        
        /* Chat */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #0d1117; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; background: #21262d; position: relative; font-size: 14px; }
        .msg.is-me { align-self: flex-end; background: var(--accent); }
        .msg b { font-size: 11px; opacity: 0.7; display: block; }
        .del-msg { color: var(--danger); cursor: pointer; position: absolute; top: 5px; right: 8px; font-weight: bold; font-size: 16px; }

        /* Input */
        .input-panel { padding: 15px; background: var(--card); border-top: 1px solid #30363d; }
        .input-row { display: flex; gap: 10px; }
        input { flex-grow: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; outline: none; }
        .btn { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; }
        .btn-primary { background: var(--accent); color: white; }
        
        .adm-btn { font-size: 9px; padding: 3px 6px; margin: 2px; border-radius: 4px; background: #30363d; color: #fff; border: none; cursor: pointer; }
        .adm-btn:hover { background: #484f58; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        
        .hidden { display: none !important; }
        .muted-text { color: var(--danger); font-size: 12px; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div id="authOverlay" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:30px; border-radius:20px; width:280px; border: 1px solid #30363d; text-align:center;">
            <h3>Cloud OS</h3>
            <input type="text" id="uName" placeholder="Никнейм" style="width:100%; margin-bottom:10px;">
            <input type="email" id="uEmail" placeholder="Ваша почта" style="width:100%; margin-bottom:15px;">
            <button onclick="login()" class="btn btn-primary" style="width:100%">Войти</button>
        </div>
    </div>

    <div class="sidebar">
        <h4>👥 Участники</h4>
        <div id="userList"></div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:auto; background:none; color:var(--danger); border:1px solid var(--danger); padding:8px; border-radius:8px; cursor:pointer;">Выйти</button>
    </div>

    <div class="chat-area">
        <div id="chatMessages"></div>
        <div class="input-panel" id="inputBox">
            <div style="margin-bottom:10px; display:flex; gap:5px;">
                <button onclick="sendMedia('😎')" class="adm-btn">😎</button>
                <button onclick="sendMedia('🚀')" class="adm-btn">🚀</button>
                <button onclick="sendMedia('https://media.tenor.com/v8S7yO_S_pUAAAAM/dance-party.gif', true)" class="adm-btn">GIF Dance</button>
            </div>
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Введите сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" class="btn btn-primary" id="sendBtn">Отправить</button>
            </div>
            <div id="muteAlert" class="muted-text hidden">Вы не можете писать (МУТ)</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, query, onSnapshot, orderBy, limit, addDoc, deleteDoc, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // --- НАСТРОЙКА АДМИНА ---
        const SUPER_ADMIN_EMAIL = "240130@turan-edu.kz"; // ВПИШИ СЮДА СВОЙ EMAIL

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentUser = JSON.parse(localStorage.getItem('cloudUser'));
        const isAdmin = currentUser && currentUser.email === SUPER_ADMIN_EMAIL;

        window.login = async () => {
            const name = document.getElementById('uName').value;
            const email = document.getElementById('uEmail').value.trim();
            if(!name || !email) return alert("Заполни поля!");

            const id = email.replace(/\./g, '_');
            const userRef = doc(db, "users", id);
            const snap = await getDoc(userRef);

            let userData = snap.exists() ? snap.data() : { name, email, joined: Date.now(), banned: false, muted: false, warns: 0, kicked: false };
            if(!snap.exists()) await setDoc(userRef, userData);
            
            if(userData.banned) return alert("Вы забанены!");
            
            localStorage.setItem('cloudUser', JSON.stringify({id, ...userData}));
            location.reload();
        };

        if(currentUser) document.getElementById('authOverlay').classList.add('hidden');

        // Чат
        window.sendMsg = async () => {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;
            await addDoc(collection(db, "messages"), {
                uid: currentUser.id, name: currentUser.name, text: input.value, type: 'text', time: serverTimestamp()
            });
            input.value = "";
        };

        window.sendMedia = async (content, isGif = false) => {
            await addDoc(collection(db, "messages"), {
                uid: currentUser.id, name: currentUser.name, text: content, type: isGif ? 'gif' : 'emoji', time: serverTimestamp()
            });
        };

        window.delMsg = async (id) => { if(isAdmin) await deleteDoc(doc(db, "messages", id)); };

        // Админ-действия
        window.admAction = async (uid, action) => {
            if(!isAdmin) return;
            const userRef = doc(db, "users", uid);
            const snap = await getDoc(userRef);
            const data = snap.data();

            if(action === 'warn') {
                let w = (data.warns || 0) + 1;
                await updateDoc(userRef, { warns: w, banned: w >= 3 });
                alert(`Варн выдан (${w}/3)`);
            }
            if(action === 'mute') await updateDoc(userRef, { muted: !data.muted });
            if(action === 'kick') await updateDoc(userRef, { kicked: true });
            if(action === 'ban') await updateDoc(userRef, { banned: true });
        };

        // Живой список пользователей
        onSnapshot(query(collection(db, "users"), orderBy("joined", "asc")), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const isUserAdmin = u.email === SUPER_ADMIN_EMAIL;

                list.innerHTML += `
                    <div class="user-card ${isUserAdmin ? 'is-admin-card' : ''}">
                        <span class="badge" style="background:${isUserAdmin ? 'gold' : '#444'}">${isUserAdmin ? 'Main Admin' : 'User'}</span>
                        <b>${u.name}</b> <small>(${u.warns || 0}⚠️)</small>
                        ${isAdmin && !isUserAdmin ? `
                            <div style="margin-top:5px">
                                <button class="adm-btn" onclick="admAction('${uid}', 'warn')">WARN</button>
                                <button class="adm-btn" onclick="admAction('${uid}', 'mute')">${u.muted ? 'UNMUTE' : 'MUTE'}</button>
                                <button class="adm-btn" onclick="admAction('${uid}', 'kick')">KICK</button>
                                <button class="adm-btn" style="color:red" onclick="admAction('${uid}', 'ban')">BAN</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        });

        // Живой чат
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(50)), (snap) => {
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = currentUser && m.uid === currentUser.id;
                const content = m.type === 'gif' ? `<img src="${m.text}" style="width:100%; border-radius:8px">` : m.text;
                chat.innerHTML += `
                    <div class="msg ${isMe ? 'is-me' : ''}">
                        ${isAdmin ? `<span class="del-msg" onclick="delMsg('${d.id}')">×</span>` : ''}
                        <b>${m.name}</b> ${content}
                    </div>
                `;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        // Контроль состояния (Мут/Кик)
        if(currentUser) {
            onSnapshot(doc(db, "users", currentUser.id), (d) => {
                const data = d.data();
                if(!data) return;
                if(data.banned || data.kicked) {
                    localStorage.clear();
                    alert("Ваш доступ ограничен!");
                    location.reload();
                }
                const isMuted = data.muted;
                document.getElementById('msgInput').disabled = isMuted;
                document.getElementById('sendBtn').classList.toggle('hidden', isMuted);
                document.getElementById('muteAlert').classList.toggle('hidden', !isMuted);
            });
        }
    </script>
</body>
</html>
