<section id="feed-section">
    <div id="feed"></div>
    
    <div class="input-box">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="adType" style="background:#010409; color:white; border:1px solid var(--border); border-radius:6px; padding:5px;">
                <option value="rent_out">Сдам в аренду</option>
                <option value="rent_in">Ищу аренду</option>
            </select>
            <input type="text" id="carModel" placeholder="Марка/Модель">
            <input type="text" id="carPrice" placeholder="Цена (тг/сутки)">
        </div>
        <input type="text" id="carImg" placeholder="Ссылка на фото (URL)" style="margin-bottom:10px;">
        <textarea id="carDesc" placeholder="Условия аренды (залог, стаж, район)..."></textarea>
        <button onclick="postAd()" class="post-btn" style="margin-top:10px;">РАЗМЕСТИТЬ ОБЪЯВЛЕНИЕ</button>
    </div>
</section>

<div id="response-modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card); padding:20px; border-radius:12px; width:90%; max-width:400px;">
        <h3>Откликнуться на объявление</h3>
        <textarea id="resMsg" placeholder="Ваше сообщение владельцу..."></textarea>
        <button onclick="sendResponse()" class="post-btn" style="margin-top:10px;">ОТПРАВИТЬ</button>
        <button onclick="closeModal()" style="background:none; border:none; color:grey; width:100%; margin-top:10px; cursor:pointer;">Отмена</button>
    </div>
</div>

<script type="module">
    // ... (код инициализации Firebase оставляем прежним)
    import { getFirestore, collection, doc, setDoc, getDoc, query, onSnapshot, orderBy, addDoc, serverTimestamp, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    let selectedAdId = null;

    // Публикация
    window.postAd = async () => {
        const type = document.getElementById('adType').value;
        const model = document.getElementById('carModel').value;
        const price = document.getElementById('carPrice').value;
        const img = document.getElementById('carImg').value || 'https://via.placeholder.com/400x200?text=JDM+Rent';
        const desc = document.getElementById('carDesc').value;

        if(!model || !price) return alert("Заполните основные поля!");

        await addDoc(collection(db, "ads"), {
            uid: currentUser.id, seller: currentUser.name,
            type, model, price, img, desc, time: serverTimestamp()
        });
        
        // Очистка
        document.querySelectorAll('.input-box input, .input-box textarea').forEach(i => i.value = "");
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.9 } });
    };

    // Отрисовка ленты
    onSnapshot(query(collection(db, "ads"), orderBy("time", "desc")), (snap) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = "";
        snap.forEach(d => {
            const ad = d.data();
            const isOwner = ad.uid === currentUser.id;
            feed.innerHTML += `
                <div class="car-card" style="border-left: 4px solid ${ad.type === 'rent_out' ? '#238636' : '#58a6ff'}">
                    <img src="${ad.img}" class="car-img">
                    <div class="car-info">
                        <span style="font-size:10px; color:${ad.type === 'rent_out' ? '#238636' : '#58a6ff'}">
                            ${ad.type === 'rent_out' ? 'СДАЮ' : 'ИЩУ'}
                        </span>
                        <p class="car-title">${ad.model}</p>
                        <p class="car-price">${ad.price}</p>
                        <p class="car-desc">${ad.desc}</p>
                        <div class="car-seller">
                            <span>Автор: ${ad.seller}</span>
                            ${isOwner ? 
                                `<span style="color:red; cursor:pointer" onclick="deleteAd('${d.id}')">Удалить</span>` : 
                                `<button onclick="openResponse('${d.id}')" style="background:var(--accent); border:none; color:white; border-radius:4px; padding:2px 8px; cursor:pointer">Откликнуться</button>`
                            }
                        </div>
                    </div>
                </div>
            `;
        });
    });

    // Работа с откликами
    window.openResponse = (id) => {
        selectedAdId = id;
        document.getElementById('response-modal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('response-modal').classList.add('hidden');

    window.sendResponse = async () => {
        const msg = document.getElementById('resMsg').value;
        if(!msg) return alert("Введите сообщение!");

        await addDoc(collection(db, "responses"), {
            adId: selectedAdId,
            fromUid: currentUser.id,
            fromName: currentUser.name,
            message: msg,
            time: serverTimestamp()
        });

        alert("Ваш отклик отправлен владельцу!");
        closeModal();
    };

    window.deleteAd = async (id) => { if(confirm("Удалить?")) await deleteDoc(doc(db, "ads", id)); };
</script>
