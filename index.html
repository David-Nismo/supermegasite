<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --up: #10b981; --down: #ef4444; --gold: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .reg-box { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; }
        
        .main-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* Роли и бейджи */
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; font-weight: bold; margin-bottom: 4px; display: inline-block; }
        .role-admin { background: var(--gold); color: #000; }
        .role-vip { background: #ec4899; color: white; }
        .role-user { background: #64748b; color: white; }

        /* Админ-кнопка */
        .admin-tool { background: #334155; border: none; color: #94a3b8; font-size: 10px; padding: 4px 8px; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .admin-tool:hover { background: var(--accent); color: white; }

        #userList { width: 100%; max-width: 450px; }
        .user-card { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 20px; border: 1px solid #334155; display: flex; align-items: center; gap: 15px; position: relative; }
        .is-me { border-color: var(--accent); }
        
        .avatar { width: 55px; height: 55px; border-radius: 18px; background: #0f172a; }
        .info { flex-grow: 1; }
        
        .rating-box { display: flex; gap: 5px; }
        .vote-btn { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px; border-radius: 10px; cursor: pointer; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="authPanel" class="reg-box">
        <h3>🔐 Вход в систему</h3>
        <input type="text" id="uName" placeholder="Никнейм">
        <input type="email" id="uEmail" placeholder="Email">
        <button class="main-btn" id="goBtn">ВОЙТИ</button>
    </div>

    <div id="myProfile" class="reg-box hidden">
        <div style="display:flex; align-items:center; gap:15px; text-align:left;">
            <img id="myAv" class="avatar">
            <div>
                <div id="myRoleBadge"></div>
                <h4 id="helloText" style="margin:0"></h4>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:15px; width:100%; background:none; border:1px solid #334155; color:#94a3b8; cursor:pointer; padding:5px; border-radius:8px;">Выйти</button>
    </div>

    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, increment, query, onSnapshot, orderBy, getDocs, limit 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ФУНКЦИЯ СМЕНЫ РОЛИ (Только для админа)
        window.changeRole = async (targetId, currentRole) => {
            const newRole = currentRole === 'vip' ? 'user' : 'vip';
            await updateDoc(doc(db, "users", targetId), { role: newRole });
        };

        window.handleVote = async (userId, type) => {
            await updateDoc(doc(db, "users", userId), { [type]: increment(1) });
        };

        document.getElementById('goBtn').onclick = async () => {
            const email = document.getElementById('uEmail').value.trim();
            const name = document.getElementById('uName').value.trim();
            if (!email) return alert("Email!");

            const docId = email.replace(/\./g, '_');
            const userRef = doc(db, "users", docId);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                if (!name) return alert("Никнейм!");
                
                // Проверяем, есть ли уже пользователи. Если нет - первый будет админом.
                const allUsers = await getDocs(query(collection(db, "users"), limit(1)));
                const role = allUsers.empty ? 'admin' : 'user';

                const newUser = { name, email, role, likes: 0, dislikes: 0, joined: new Date().toISOString() };
                await setDoc(userRef, newUser);
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...newUser}));
            } else {
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...userSnap.data()}));
            }
            location.reload();
        };

        const saved = JSON.parse(localStorage.getItem('cloudUser'));
        let myRole = 'user';

        if (saved) {
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('myProfile').classList.remove('hidden');
            
            // Получаем актуальную роль из базы в реальном времени
            onSnapshot(doc(db, "users", saved.id), (d) => {
                const data = d.data();
                myRole = data.role;
                document.getElementById('helloText').innerText = data.name;
                document.getElementById('myAv').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${data.name}`;
                document.getElementById('myRoleBadge').innerHTML = `<span class="badge role-${data.role}">${data.role}</span>`;
            });
        }

        onSnapshot(query(collection(db, "users"), orderBy("joined", "desc")), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const isMe = saved && saved.id === uid;
                
                let roleIcon = u.role === 'admin' ? '👑' : (u.role === 'vip' ? '⭐' : '');

                list.innerHTML += `
                    <div class="user-card ${isMe ? 'is-me' : ''}">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${u.name}" class="avatar">
                        <div class="info">
                            <span class="badge role-${u.role}">${u.role}</span>
                            <b>${roleIcon} ${u.name}</b>
                            ${myRole === 'admin' && u.role !== 'admin' ? 
                                `<button class="admin-tool" onclick="changeRole('${uid}', '${u.role}')">Сменить роль (User/VIP)</button>` : ''}
                        </div>
                        <div class="rating-box">
                            <button class="vote-btn" onclick="handleVote('${uid}', 'likes')">👍 ${u.likes || 0}</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
