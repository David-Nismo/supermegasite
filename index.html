<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.M.S V2</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --me: #23863622; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #c9d1d9; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .app-container { display: flex; flex-direction: column; height: 100vh; max-width: 700px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); background: var(--bg); }

        /* Шапка */
        .header { padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .status-dot { width: 8px; height: 8px; background: #238636; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Чат */
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }

        .msg-row { padding: 8px 15px; border-radius: 6px; transition: 0.2s; border-left: 3px solid transparent; }
        .msg-row:hover { background: #161b22; }
        .msg-row.is-me { background: var(--me); border-left-color: #238636; }
        
        .msg-meta { font-size: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .msg-author { font-weight: bold; color: var(--accent); }
        .msg-time { color: #8b949e; font-size: 10px; }
        .msg-text { font-size: 15px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }

        /* Индикатор отправки */
        .pending { opacity: 0.5; font-style: italic; }

        /* Ввод */
        .input-area { padding: 15px 20px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 10px; }
        #msgInput { flex-grow: 1; background: #010409; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; outline: none; }
        .send-btn { background: #238636; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .send-btn:active { transform: scale(0.95); }

        .hidden { display: none !important; }
        #auth { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="auth">
        <div style="background:var(--card); padding:30px; border-radius:12px; border:1px solid var(--border); width:300px; text-align:center;">
            <h3>Cloud OS Login</h3>
            <input type="text" id="regName" placeholder="Никнейм" style="width:100%; padding:10px; margin-bottom:10px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:5px;">
            <input type="email" id="regEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:20px; background:#0d1117; color:white; border:1px solid var(--border); border-radius:5px;">
            <button onclick="login()" class="send-btn" style="width:100%; height:40px;">Войти</button>
        </div>
    </div>

    <div class="app-container">
        <div class="header">
            <div><span class="status-dot"></span> <b>Cloud Chat Live</b></div>
            <div id="uCount" style="font-size: 12px; color: #8b949e;">...</div>
        </div>

        <div id="chatMessages"></div>

        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="send-btn">➜</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, updateDoc, query, onSnapshot, orderBy, limit, addDoc, serverTimestamp, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let user = JSON.parse(localStorage.getItem('cloudUser'));
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3'); // Звук уведомления

        // Вход
        window.login = async () => {
            const n = document.getElementById('regName').value;
            const e = document.getElementById('regEmail').value.trim();
            if(!n || !e) return;
            const id = e.replace(/\./g, '_');
            const ref = doc(db, "users", id);
            if(!(await getDoc(ref)).exists()) {
                await setDoc(ref, { name: n, email: e, xp: 0, muted: false });
            }
            localStorage.setItem('cloudUser', JSON.stringify({id, name: n, email: e}));
            location.reload();
        };

        if(user) document.getElementById('auth').classList.add('hidden');

        // МГНОВЕННАЯ ОТПРАВКА
        window.send = async () => {
            const inp = document.getElementById('msgInput');
            const val = inp.value.trim();
            if(!val || !user) return;
            inp.value = ""; 

            try {
                // Firebase добавит это в локальный кэш мгновенно
                await addDoc(collection(db, "messages"), {
                    uid: user.id,
                    name: user.name,
                    text: val,
                    time: serverTimestamp()
                });
                updateDoc(doc(db, "users", user.id), { xp: increment(2) });
            } catch(e) { console.error(e); }
        };

        // СЛУШАТЕЛЬ СООБЩЕНИЙ (Optimized)
        const q = query(collection(db, "messages"), orderBy("time", "desc"), limit(30));
        let firstLoad = true;

        onSnapshot(q, (snap) => {
            const box = document.getElementById('chatMessages');
            const messages = [];
            
            snap.forEach(d => messages.unshift({id: d.id, ...d.data()}));

            box.innerHTML = "";
            messages.forEach(m => {
                const isMe = user && m.uid === user.id;
                const isPending = !m.time; // Если сервер еще не поставил время
                
                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'is-me' : ''} ${isPending ? 'pending' : ''}">
                        <div class="msg-meta">
                            <span class="msg-author">${m.name}</span>
                            <span class="msg-time">${isPending ? 'отправка...' : 'доставлено'}</span>
                        </div>
                        <div class="msg-text">${m.text}</div>
                    </div>
                `;
            });

            box.scrollTop = box.scrollHeight;
            
            if(!firstLoad && !snap.metadata.hasPendingWrites) {
                audio.play().catch(() => {}); // Звук при новом сообщении
            }
            firstLoad = false;
        });

        // Счетчик юзеров
        onSnapshot(collection(db, "users"), s => document.getElementById('uCount').innerText = `В базе: ${s.size}`);
    </script>
</body>
</html>
