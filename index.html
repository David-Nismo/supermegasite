<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0b0f1a; --card: #161b22; --admin: #f59e0b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Боковая панель (Профили) */
        .sidebar { width: 350px; background: var(--card); border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        
        /* Основная область (Чат) */
        .chat-area { flex-grow: 1; display: flex; flex-direction: column; background: #0d1117; }
        #chatMessages { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Сообщения */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; background: #21262d; position: relative; animation: fadeIn 0.3s; }
        .msg.is-me { align-self: flex-end; background: var(--accent); }
        .msg b { display: block; font-size: 12px; margin-bottom: 4px; opacity: 0.8; }
        .msg img.sticker { width: 100px; display: block; margin-top: 5px; }
        .msg .delete-btn { position: absolute; top: 5px; right: 5px; cursor: pointer; display: none; background: rgba(0,0,0,0.5); border-radius: 50%; width: 18px; height: 18px; font-size: 10px; text-align: center; }
        .msg:hover .delete-btn { display: block; }

        /* Панель ввода */
        .input-panel { padding: 20px; background: var(--card); border-top: 1px solid #30363d; }
        .controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-row { display: flex; gap: 10px; }
        input#msgInput { flex-grow: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 10px; }
        
        /* Админка */
        .user-card { background: #21262d; padding: 10px; border-radius: 12px; margin-bottom: 10px; font-size: 13px; border: 1px solid transparent; }
        .user-card.is-admin { border-color: var(--admin); }
        .admin-actions { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
        .adm-btn { font-size: 10px; padding: 4px 8px; border-radius: 4px; border: none; cursor: pointer; background: #30363d; color: white; }
        .adm-btn.danger { background: #f85149; }

        .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-right: 5px; }
        .bg-admin { background: var(--admin); color: black; }
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authOverlay" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:40px; border-radius:24px; text-align:center; width:300px;">
            <h3>Cloud OS Login</h3>
            <input type="text" id="uName" placeholder="Никнейм" style="width:100%; margin-bottom:10px; padding:10px; border-radius:8px; background:#000; border:1px solid #334155; color:white;">
            <input type="email" id="uEmail" placeholder="Email" style="width:100%; margin-bottom:20px; padding:10px; border-radius:8px; background:#000; border:1px solid #334155; color:white;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; cursor:pointer;">Войти в систему</button>
        </div>
    </div>

    <div class="sidebar">
        <h4>Жители (Админ-панель)</h4>
        <div id="userList"></div>
        <hr style="width:100%; border:0; border-top:1px solid #30363d; margin: 20px 0;">
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid #f85149; color:#f85149; cursor:pointer; padding:10px; border-radius:8px;">Выйти</button>
    </div>

    <div class="chat-area">
        <div id="chatMessages"></div>
        
        <div class="input-panel">
            <div class="controls">
                <button onclick="sendMedia('😎')" class="adm-btn">😎</button>
                <button onclick="sendMedia('🔥')" class="adm-btn">🔥</button>
                <button onclick="sendMedia('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZ6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/3o7TKMGpxS7SPO6Fsk/giphy.gif', true)" class="adm-btn">GIF Dance</button>
                <button onclick="sendMedia('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHRueGZ3bmZ6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6Z3R6JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/26vUu9bH3S8Y2vG8w/giphy.gif', true)" class="adm-btn">GIF Wow</button>
            </div>
            <div class="input-row">
                <input type="text" id="msgInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" class="main-btn" style="padding: 0 20px; background:var(--accent); border:none; border-radius:10px; color:white; cursor:pointer;">Отправить</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, increment, query, onSnapshot, orderBy, limit, addDoc, deleteDoc, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentUser = JSON.parse(localStorage.getItem('cloudUser'));
        let adminId = "";

        // --- ЛОГИКА ВХОДА ---
        window.login = async () => {
            const name = document.getElementById('uName').value;
            const email = document.getElementById('uEmail').value;
            if(!name || !email) return;
            const id = email.replace(/\./g, '_');
            const userRef = doc(db, "users", id);
            const snap = await getDoc(userRef);
            
            let data = snap.exists() ? snap.data() : { name, email, joined: Date.now(), banned: false };
            if(!snap.exists()) await setDoc(userRef, data);
            
            if(data.banned) return alert("Вы забанены!");
            
            localStorage.setItem('cloudUser', JSON.stringify({id, ...data}));
            location.reload();
        };

        if(currentUser) document.getElementById('authOverlay').classList.add('hidden');

        // --- ЛОГИКА ЧАТА ---
        window.sendMsg = async () => {
            const text = document.getElementById('msgInput').value;
            if(!text.trim()) return;
            await addDoc(collection(db, "messages"), {
                uid: currentUser.id,
                name: currentUser.name,
                text: text,
                type: 'text',
                time: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        };

        window.sendMedia = async (content, isGif = false) => {
            await addDoc(collection(db, "messages"), {
                uid: currentUser.id,
                name: currentUser.name,
                text: content,
                type: isGif ? 'gif' : 'emoji',
                time: serverTimestamp()
            });
        };

        // Слушаем сообщения
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc"), limit(50)), (snap) => {
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = "";
            snap.forEach(d => {
                const m = d.data();
                const isMe = currentUser && m.uid === currentUser.id;
                const isAdmin = currentUser && currentUser.id === adminId;
                
                let content = m.type === 'gif' ? `<img src="${m.text}" class="sticker">` : m.text;
                
                chat.innerHTML += `
                    <div class="msg ${isMe ? 'is-me' : ''}">
                        <b>${m.name}</b>
                        ${content}
                        ${isAdmin ? `<div class="delete-btn" onclick="deleteMsg('${d.id}')">×</div>` : ''}
                    </div>
                `;
            });
            chat.scrollTop = chat.scrollHeight;
        });

        // --- ЛОГИКА АДМИНКИ ---
        window.deleteMsg = async (id) => await deleteDoc(doc(db, "messages", id));
        window.banUser = async (id, status) => await updateDoc(doc(db, "users", id), { banned: status });
        window.setVIP = async (id, status) => await updateDoc(doc(db, "users", id), { isVIP: status });

        onSnapshot(query(collection(db, "users"), orderBy("joined", "asc")), (snap) => {
            adminId = snap.docs[0].id; // Самый первый - админ
            const list = document.getElementById('userList');
            list.innerHTML = "";
            
            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const isThisAdmin = uid === adminId;
                const amIAdmin = currentUser && currentUser.id === adminId;

                list.innerHTML += `
                    <div class="user-card ${isThisAdmin ? 'is-admin' : ''}">
                        ${isThisAdmin ? '<span class="badge bg-admin">Admin</span>' : ''}
                        ${u.isVIP ? '<span class="badge" style="background:magenta">VIP</span>' : ''}
                        <b>${u.name}</b>
                        ${u.banned ? '<span style="color:red"> [BANNED]</span>' : ''}
                        
                        ${amIAdmin && !isThisAdmin ? `
                            <div class="admin-actions">
                                <button class="adm-btn" onclick="setVIP('${uid}', ${!u.isVIP})">VIP</button>
                                <button class="adm-btn danger" onclick="banUser('${uid}', ${!u.banned})">${u.banned ? 'Unban' : 'Ban'}</button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });
        });

        // Проверка бана в реальном времени
        if(currentUser) {
            onSnapshot(doc(db, "users", currentUser.id), (d) => {
                if(d.exists() && d.data().banned) {
                    localStorage.clear();
                    alert("Вас забанили!");
                    location.reload();
                }
            });
        }
    </script>
</body>
</html>
