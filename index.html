<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        
        #login-form { display: flex; flex-direction: column; gap: 10px; border: 1px solid #ccc; padding: 10px; border-radius: 8px; width: 100%; max-width: 400px; }
        #login-form input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        #login-form button { padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .auth-info { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        #logout-btn { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-info" class="auth-info" style="display: none;">
        <img id="user-photo" src="" alt="User Photo" width="40" style="border-radius: 50%;">
        <span id="user-name"></span>
        <button id="logout-btn">Выйти</button>
    </div>

    <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Войти / Зарегистрироваться</button>
    </form>

    <div id="main-program" style="display: none; width: 100%; max-width: 600px;">
        <div class="wrapper">
            <input type="text" id="request-input" placeholder="Введите ваш запрос">
            <button id="send-request-btn">Отправить запрос</button>
        </div>
        <div id="requests-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, updateDoc, doc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
  authDomain: "supermegasite-6c1a9.firebaseapp.com",
  projectId: "supermegasite-6c1a9",
  storageBucket: "supermegasite-6c1a9.firebasestorage.app",
  messagingSenderId: "301398062192",
  appId: "1:301398062192:web:39b01badba333fe1e7b0b5",
  measurementId: "G-XG9537KF24"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const mainProgram = document.getElementById('main-program');
        const authInfo = document.getElementById('auth-info');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginForm.style.display = 'none';
                authInfo.style.display = 'flex';
                mainProgram.style.display = 'block';
                document.getElementById('user-name').textContent = user.email;
                loadRequests();
            } else {
                loginForm.style.display = 'flex';
                authInfo.style.display = 'none';
                mainProgram.style.display = 'none';
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                try {
                    await createUserWithEmailAndPassword(auth, email, password);
                } catch (err) {
                    alert("Ошибка: " + err.message);
                }
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth);
        });

        async function loadRequests() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('requests-container');
                container.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'wrapper';
                    div.innerHTML = `
                        <div>${data.text}</div>
                        <button onclick="likeRequest('${doc.id}')">❤️ ${data.likes || 0}</button>
                    `;
                    container.appendChild(div);
                });
            });
        }

        window.likeRequest = async (id) => {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, {
                likes: increment(1)
            });
        };

        document.getElementById('send-request-btn').addEventListener('click', async () => {
            const input = document.getElementById('request-input');
            if (input.value.trim() !== "") {
                await addDoc(collection(db, "requests"), {
                    text: input.value,
                    timestamp: serverTimestamp(),
                    likes: 0
                });
                input.value = "";
            }
        });
    </script>
</body>
</html>
