<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Cloud Chat</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        
        #login-block { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; margin-top: 80px; text-align: center; }
        #login-block input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #login-block button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .main-container { display: flex; width: 100%; max-width: 1000px; height: 90vh; background: white; margin-top: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 12px; overflow: hidden; }
        .sidebar { width: 300px; border-right: 1px solid #eee; display: flex; flex-direction: column; background: #fff; }
        .sidebar-header { padding: 20px; background: #f8f9fa; border-bottom: 1px solid #eee; font-weight: bold; }
        #users-container { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px 20px; border-bottom: 1px solid #f9f9f9; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .user-item:hover { background: #f0f7ff; }
        .user-item.active { background: #e7f3ff; border-left: 4px solid #007bff; }
        .user-avatar { width: 35px; height: 35px; background: #007bff; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .chat-window { flex: 1; display: flex; flex-direction: column; }
        .chat-header { padding: 15px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; background: #f4f7f6; display: flex; flex-direction: column; gap: 12px; }
        .msg { max-width: 65%; padding: 10px 15px; border-radius: 18px; font-size: 14px; position: relative; }
        .msg-time { font-size: 10px; margin-top: 4px; opacity: 0.6; text-align: right; display: block; }
        .sent { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 4px; }
        .received { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; border: 1px solid #eee; }

        .input-area { padding: 20px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .input-area input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
        .input-area button { background: #007bff; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }
        #logout-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-block">
        <h2 style="margin-bottom: 20px;">Welcome</h2>
        <input type="text" id="username" placeholder="Никнейм" autocomplete="off">
        <input type="email" id="email" placeholder="Email" autocomplete="username">
        <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
        <button id="auth-btn">Войти / Регистрация</button>
    </div>

    <div id="chat-block" class="main-container hidden">
        <div class="sidebar">
            <div class="sidebar-header">Контакты</div>
            <div id="users-container"></div>
        </div>
        <div class="chat-window">
            <div class="chat-header">
                <span id="chat-with-title" style="font-weight: bold; color: #007bff;">Выберите чат</span>
                <button id="logout-btn">Выйти</button>
            </div>
            <div class="messages-box" id="messages-box"></div>
            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Сообщение...">
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let recipientId = null;
        let unsubMessages = null;

        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            let name = document.getElementById('username').value;

            // Если браузер вставил почту в поле ника - обрезаем её
            if (name.includes('@')) name = name.split('@')[0];

            try {
                const res = await signInWithEmailAndPassword(auth, email, pass);
                // Всегда обновляем UID и ник при входе для корректной работы фильтра
                await setDoc(doc(db, "chat_users", res.user.uid), { 
                    username: name || res.user.email.split('@')[0], 
                    uid: res.user.uid 
                }, { merge: true });
            } catch {
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, "chat_users", res.user.uid), { 
                        username: name || email.split('@')[0], 
                        email: email, 
                        uid: res.user.uid 
                    });
                } catch (e) { alert(e.message); }
            }
        };

        document.getElementById('logout-btn').onclick = () => { recipientId = null; signOut(auth); };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-block').classList.add('hidden');
                document.getElementById('chat-block').classList.remove('hidden');
                loadUsers();
            } else {
                currentUser = null;
                document.getElementById('login-block').classList.remove('hidden');
                document.getElementById('chat-block').classList.add('hidden');
            }
        });

        function loadUsers() {
            if (!currentUser) return;
            onSnapshot(collection(db, "chat_users"), (snap) => {
                const container = document.getElementById('users-container');
                container.innerHTML = '';
                snap.forEach(uDoc => {
                    const u = uDoc.data();
                    const uID = u.uid || uDoc.id; // Проверка по полю или по ID документа

                    // СТРОГИЙ ФИЛЬТР: Не показываем себя
                    if (uID !== currentUser.uid) {
                        const div = document.createElement('div');
                        div.className = 'user-item';
                        const displayName = u.username || u.email || "Аноним";
                        div.innerHTML = `<div class="user-avatar">${displayName[0].toUpperCase()}</div><span>${displayName}</span>`;
                        div.onclick = () => {
                            document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
                            div.classList.add('active');
                            startChat(uID, displayName);
                        };
                        container.appendChild(div);
                    }
                });
            });
        }

        function startChat(id, name) {
            recipientId = id;
            document.getElementById('chat-with-title').innerText = name;
            const roomId = [currentUser.uid, id].sort().join('_');
            if (unsubMessages) unsubMessages();
            const q = query(collection(db, "private_chats", roomId, "messages"), orderBy("timestamp", "asc"));
            unsubMessages = onSnapshot(q, (snap) => {
                const box = document.getElementById('messages-box');
                box.innerHTML = '';
                snap.forEach(mDoc => {
                    const m = mDoc.data();
                    const date = m.timestamp ? new Date(m.timestamp.seconds * 1000) : new Date();
                    const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const d = document.createElement('div');
                    d.className = `msg ${m.senderId === currentUser.uid ? 'sent' : 'received'}`;
                    d.innerHTML = `${m.text}<span class="msg-time">${timeStr}</span>`;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('send-btn').onclick = async () => {
            const input = document.getElementById('msg-input');
            if (input.value.trim() && recipientId) {
                const roomId = [currentUser.uid, recipientId].sort().join('_');
                await addDoc(collection(db, "private_chats", roomId, "messages"), {
                    text: input.value,
                    senderId: currentUser.uid,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            }
        };
    </script>
</body>
</html>
