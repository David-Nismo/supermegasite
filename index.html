<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mega Site</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #6366f1; --bg: #0f172a; --card: #1e293b; --up: #10b981; --down: #ef4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        /* Анимация появления */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .reg-box { width: 100%; max-width: 400px; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; text-align: center; margin-bottom: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 12px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        
        .main-btn { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .main-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Стиль профиля */
        .profile-header { display: flex; align-items: center; gap: 15px; text-align: left; margin-bottom: 15px; }
        .lvl-badge { background: var(--accent); font-size: 10px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }

        /* Список профилей */
        #userList { width: 100%; max-width: 450px; }
        .user-card { background: var(--card); margin-bottom: 15px; padding: 15px; border-radius: 20px; border: 1px solid #334155; display: flex; align-items: center; gap: 15px; animation: slideUp 0.4s ease forwards; }
        .user-card.is-me { border: 2px solid var(--accent); background: #1e294b; }
        
        .avatar { width: 55px; height: 55px; border-radius: 18px; background: #0f172a; border: 2px solid #334155; }
        .info { flex-grow: 1; }
        .info b { color: #f8fafc; font-size: 16px; display: block; }
        .exp-bar { height: 4px; width: 60px; background: #334155; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .exp-fill { height: 100%; background: var(--accent); transition: 0.5s; }
        
        .rating-box { display: flex; gap: 8px; }
        .vote-btn { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: 0.2s; }
        .vote-btn:active { transform: scale(0.9); }
        .btn-up:hover { border-color: var(--up); background: rgba(16, 185, 129, 0.1); color: var(--up); }
        .btn-down:hover { border-color: var(--down); background: rgba(239, 68, 68, 0.1); color: var(--down); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="authPanel" class="reg-box">
        <h3 style="margin-top:0">🚀 Облачный вход</h3>
        <input type="text" id="uName" placeholder="Придумайте никнейм">
        <input type="email" id="uEmail" placeholder="Ваш Email">
        <button class="main-btn" id="goBtn">ВОЙТИ В СИСТЕМУ</button>
    </div>

    <div id="myProfile" class="reg-box hidden">
        <div class="profile-header">
            <img id="myAv" class="avatar" src="">
            <div>
                <span class="lvl-badge">Участник</span>
                <h4 id="helloText" style="margin: 5px 0 0 0;"></h4>
            </div>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="background:none; border:1px solid #334155; color:#94a3b8; padding:8px 15px; border-radius:10px; cursor:pointer; width:100%; font-size: 12px;">Покинуть облако</button>
    </div>

    <h3 style="color: #94a3b8; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Топ жителей облака:</h3>
    <div id="userList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, setDoc, getDoc, updateDoc, increment, query, onSnapshot, orderBy 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // Твой конфиг остается прежним
        const firebaseConfig = {
            apiKey: "AIzaSyDIuPsxUWVwJ1rVl1ytjVUHA84L4nQlwrM",
            authDomain: "supermegasite-6c1a9.firebaseapp.com",
            projectId: "supermegasite-6c1a9",
            storageBucket: "supermegasite-6c1a9.firebasestorage.app",
            messagingSenderId: "301398062192",
            appId: "1:301398062192:web:39b01badba333fe1e7b0b5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.handleVote = async (userId, type) => {
            const userRef = doc(db, "users", userId);
            try {
                await updateDoc(userRef, { [type]: increment(1) });
            } catch (e) { console.error("Ошибка:", e); }
        };

        document.getElementById('goBtn').onclick = async () => {
            const email = document.getElementById('uEmail').value.trim();
            const name = document.getElementById('uName').value.trim();
            if (!email) return alert("Нужен Email!");

            const docId = email.replace(/\./g, '_');
            const userRef = doc(db, "users", docId);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...userSnap.data()}));
            } else {
                if (!name) return alert("Введите никнейм!");
                const newUser = { name, email, likes: 0, dislikes: 0, joined: new Date().toISOString() };
                await setDoc(userRef, newUser);
                localStorage.setItem('cloudUser', JSON.stringify({id: docId, ...newUser}));
            }
            
            // Бабах! Конфетти при входе
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#6366f1', '#10b981'] });
            
            setTimeout(() => location.reload(), 1200);
        };

        const saved = JSON.parse(localStorage.getItem('cloudUser'));
        if (saved) {
            document.getElementById('authPanel').classList.add('hidden');
            document.getElementById('myProfile').classList.remove('hidden');
            document.getElementById('helloText').innerText = saved.name;
            document.getElementById('myAv').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${saved.name}`;
        }

        onSnapshot(query(collection(db, "users"), orderBy("likes", "desc")), (snap) => {
            const list = document.getElementById('userList');
            list.innerHTML = "";
            snap.forEach(d => {
                const u = d.data();
                const uid = d.id;
                const isMe = saved && saved.id === uid;
                
                // Считаем уровень на основе лайков (каждые 5 лайков = +1 уровень)
                const lvl = Math.floor((u.likes || 0) / 5) + 1;
                const progress = ((u.likes || 0) % 5) * 20;

                list.innerHTML += `
                    <div class="user-card ${isMe ? 'is-me' : ''}">
                        <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${u.name}" class="avatar">
                        <div class="info">
                            <b>${u.name} ${isMe ? '👤' : ''}</b>
                            <span style="font-size: 11px; color: #64748b">Уровень ${lvl}</span>
                            <div class="exp-bar"><div class="exp-fill" style="width: ${progress}%"></div></div>
                        </div>
                        <div class="rating-box">
                            <button class="vote-btn btn-up" onclick="handleVote('${uid}', 'likes')">
                                👍 ${u.likes || 0}
                            </button>
                            <button class="vote-btn btn-down" onclick="handleVote('${uid}', 'dislikes')">
                                👎 ${u.dislikes || 0}
                            </button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
